apiVersion: v1
kind: Namespace
metadata:
  name: pairdrop-space
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pairdrop
  namespace: pairdrop-space
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pairdrop
  template:
    metadata:
      labels:
        app: pairdrop
    spec:
      containers:
      - name: pairdrop
        image: lscr.io/linuxserver/pairdrop:latest
        env:
          - name: PUID
            value: "1000"
          - name: PGID
            value: "1000"
          - name: TZ
            value: "America/New_York"
          - name: WS_FALLBACK
            value: "false"
          - name: RATE_LIMIT
            value: "false"
          - name: DEBUG_MODE
            value: "false"
        ports:
          - name: http
            containerPort: 3000
            protocol: TCP
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: pairdrop-service
  namespace: pairdrop-space
spec:
  type: NodePort
  selector:
    app: pairdrop
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30000
