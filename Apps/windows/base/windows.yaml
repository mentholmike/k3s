apiVersion: v1
kind: Namespace
metadata:
  name: windows-space
  labels:
    # Required: dockur/windows needs privileged pods for KVM and TUN devices
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: windows-storage-pvc
  namespace: windows-space
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 75Gi
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: windows
  namespace: windows-space
spec:
  replicas: 1
  # Recreate is required for RWO volumes — RollingUpdate will cause the new pod
  # to block on volume attach while the old pod still holds the claim.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: windows
  template:
    metadata:
      labels:
        app: windows
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 120
      # Pin to nodes with KVM support. The hostPath volumes (/dev/kvm, /dev/net/tun)
      # require a KVM-capable node. Pinning also ensures Longhorn keeps the volume
      # replica local to the same node, preventing cross-node attach failures.
      nodeSelector:
        kvm: "true"
        kubernetes.io/hostname: talos-ckf-wwf
      containers:
      - name: windows
        image: dockurr/windows
        env:
          - name: VERSION
            value: "10"
          - name: RAM_SIZE
            value: "6G"
          - name: CPU_CORES
            value: "2"
          - name: DISK_SIZE
            value: "60G"
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "10Gi"
            cpu: "4"
        ports:
          - name: web
            containerPort: 8006
            protocol: TCP
          - name: rdp-tcp
            containerPort: 3389
            protocol: TCP
          - name: rdp-udp
            containerPort: 3389
            protocol: UDP
          - name: vnc
            containerPort: 5900
            protocol: TCP
        securityContext:
          privileged: true
          capabilities:
            add:
              - NET_ADMIN
        volumeMounts:
          - name: windows-storage
            mountPath: /storage
          - name: dev-kvm
            mountPath: /dev/kvm
      volumes:
        - name: windows-storage
          persistentVolumeClaim:
            claimName: windows-storage-pvc
        - name: dev-kvm
          hostPath:
            path: /dev/kvm
---
apiVersion: v1
kind: Service
metadata:
  name: windows-service
  namespace: windows-space
spec:
  type: NodePort
  selector:
    app: windows
  ports:
    - name: web
      protocol: TCP
      port: 8006
      targetPort: 8006
      nodePort: 30007
    - name: rdp-tcp
      protocol: TCP
      port: 3389
      targetPort: 3389
      nodePort: 30008
    - name: vnc
      protocol: TCP
      port: 5900
      targetPort: 5900
      nodePort: 30009
